<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Incubadora de Ideias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/base.css">
    <link rel="stylesheet" href="/static/forms.css">
    <link rel="shortcut icon" href="/static/Designer.png" type="image/x-icon">
</head>
<body>

<main class="form-page">

<form id="loginForm">

    <div class="form-header">
        <h2>Incubadora de Ideias</h2>
        <p>Informe seu nome e matrícula para continuar</p>
    </div>

    <div class="form-group">
        <label>Nome</label>
        <input type="text" name="nome" required>
    </div>

    <div class="form-group">
        <label>Matrícula</label>
        <input type="text" name="matricula" required>
    </div>

    <button type="submit" class="btn">
        Entrar
    </button>

</form>
</main>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const dados = Object.fromEntries(
        new FormData(e.target).entries()
    );

    Swal.fire({
        title: 'Entrando...',
        text: 'Validando informações',
        allowOutsideClick: false,
        didOpen: () => {
            Swal.showLoading();
        }
    });

    try {

        const resp = await fetch("/api/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(dados)
        });

        const resultado = await resp.json();

        if (resp.ok) {

            if (resultado.primeiro_acesso) {

                await Swal.fire({
                    icon: 'success',
                    title: 'Bem-vindo à Incubadora de Ideias!',
                    text: 'Seu acesso foi criado com sucesso.',
                    confirmButtonColor: '#c3002f'
                });

            } else {

                await Swal.fire({
                    icon: 'success',
                    title: 'Bem-vindo de volta!',
                    text: 'Redirecionando...',
                    confirmButtonColor: '#c3002f',
                    timer: 1500,
                    showConfirmButton: false
                });

            }

            window.location.href = "/";

        } else {

            Swal.fire({
                icon: 'error',
                title: 'Não foi possível acessar',
                text: resultado.erro || 'Tente novamente.',
                confirmButtonColor: '#c3002f'
            });

        }

    } catch (err) {

        Swal.fire({
            icon: 'error',
            title: 'Erro de conexão',
            text: 'Não foi possível conectar ao servidor.',
            confirmButtonColor: '#c3002f'
        });

    }

});
</script>

</body>
</html>
